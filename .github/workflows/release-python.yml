name: Release - Python

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        required: false
        type: string
        default: "ubuntu-latest"
      docker-enabled:
        description: "Enable Docker image build and push"
        required: false
        type: boolean
        default: true
      docker-target-repository:
        description: "Target Docker repository (e.g., org/image)"
        required: false
        type: string
        default: ""
      docker-registry:
        description: "Docker registry URL (e.g., docker.io, ghcr.io)"
        required: false
        type: string
        default: "docker.io"
      docker-dockerfile:
        description: "Path to Dockerfile (e.g., Dockerfile)"
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        description: "Docker build context directory"
        required: false
        type: string
        default: "."
      docker-build-args:
        description:
          "Docker build arguments (space-separated, e.g., '--build-arg
          VERSION=1.0.0 --build-arg ENV=prod')"
        required: false
        type: string
        default: ""
      tests-enabled:
        description: "Enable pytest before release"
        required: false
        type: boolean
        default: true
      pytest-args:
        description: "Additional arguments to pass to pytest"
        required: false
        type: string
        default: ""
      publish-package-enabled:
        description: "Enable package publishing to Nexus"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_USERNAME:
        description: "Docker registry username"
        required: false
      DOCKER_PASSWORD:
        description: "Docker registry password or token"
        required: false
      NEXUS_USERNAME:
        description: "Nexus username"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus password"
        required: false
      NEXUS_REPOSITORY_URL:
        description: "Nexus repository URL"
        required: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  extract-versions:
    name: Extract Python Versions
    runs-on: ${{ inputs.runner }}
    outputs:
      python-versions: ${{ steps.extract.outputs.versions-json }}
      min-version: ${{ steps.extract.outputs.min-version }}
      max-version: ${{ steps.extract.outputs.max-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract Python versions
        uses: m4nh/shared-cicd/actions/python/extract-python-versions@main
        id: extract

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ inputs.runner }}
    if: inputs.tests-enabled
    needs: extract-versions
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.extract-versions.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run pytest
        uses: m4nh/shared-cicd/actions/python/run-pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: ${{ inputs.pytest-args }}
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          nexus-repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}

  release:
    name: Create Tag and GitHub Release
    runs-on: ${{ inputs.runner }}
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result ==
      'skipped')
    permissions:
      contents: write
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark workspace as git safe directory
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/_github_home"
          git config --file "$RUNNER_TEMP/_github_home/.gitconfig" --add safe.directory /github/workspace

      - name: Install Python Semantic Release
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release==9.*

      - name: Run Python Semantic Release
        id: semrel
        run: semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

  docker:
    name: Build and Push Docker Image
    runs-on: ${{ inputs.runner }}
    needs: release
    if: inputs.docker-enabled && needs.release.outputs.released == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pip Nexus secret
        shell: bash
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY_URL: ${{ secrets.NEXUS_REPOSITORY_URL }}
        run: |
          if [ -n "$NEXUS_REPOSITORY_URL" ]; then
            BASE_URL="${NEXUS_REPOSITORY_URL%/}"
            PROTO="${BASE_URL%%://*}"
            REST="${BASE_URL#*://}"
            echo "${PROTO}://${NEXUS_USERNAME}:${NEXUS_PASSWORD}@${REST}/simple/" > /tmp/pip_extra_index_url
          else
            echo "" > /tmp/pip_extra_index_url
          fi

      - name: Build Docker Image
        uses: m4nh/shared-cicd/actions/docker/build-docker-image@main
        with:
          dockerfile: ${{ inputs.docker-dockerfile }}
          context: ${{ inputs.docker-context }}
          tags: "release-image:${{ needs.release.outputs.version }}"
          version: ${{ needs.release.outputs.version }}
          build-args: ${{ inputs.docker-build-args }}
          build-secrets: "--secret id=pip_extra_index_url,src=/tmp/pip_extra_index_url"

      - name: Push Docker Image
        uses: m4nh/shared-cicd/actions/docker/push-docker@main
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          image-name: release-image
          image-tag: ${{ needs.release.outputs.version }}
          target-repository: ${{ inputs.docker-target-repository }}
          registry: ${{ inputs.docker-registry }}

  build-and-publish-package:
    name: Build and Publish Package
    runs-on: ${{ inputs.runner }}
    needs: [release, extract-versions]
    if: inputs.publish-package-enabled && needs.release.outputs.released == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wheel
        uses: m4nh/shared-cicd/actions/python/build-wheel@main
        with:
          python-version: ${{ needs.extract-versions.outputs.min-version }}
          version: ${{ needs.release.outputs.version }}

      - name: Publish Package
        uses: m4nh/shared-cicd/actions/python/publish-package@main
        with:
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          wheel-path: dist/*
          repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}
