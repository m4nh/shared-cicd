name: CI - Python

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        required: false
        type: string
        default: "ubuntu-latest"
      lint-enabled:
        description: "Enable linting"
        required: false
        type: boolean
        default: true
      lint-fix:
        description: "Auto-fix lint issues if the linter supports it (ruff only)"
        required: false
        type: boolean
        default: false
      linter:
        description: "Linter to use (ruff, flake8, pylint, black)"
        required: false
        type: string
        default: "ruff"
      linter-args:
        description: "Additional linter arguments"
        required: false
        type: string
        default: ""
      lint-path:
        description: "Path to lint"
        required: false
        type: string
        default: "."
      tests-enabled:
        description: "Enable testing"
        required: false
        type: boolean
        default: true
      pytest-args:
        description: "Additional arguments to pass to pytest"
        required: false
        type: string
        default: ""
      security-enabled:
        description: "Enable security scanning"
        required: false
        type: boolean
        default: true
      security-source-path:
        description: "Path for bandit security analysis"
        required: false
        type: string
        default: "src/"
      build-wheel-enabled:
        description: "Enable wheel build"
        required: false
        type: boolean
        default: true
      build-docker-enabled:
        description: "Enable Docker build"
        required: false
        type: boolean
        default: true
      docker-dockerfile:
        description: "Path to Dockerfile (e.g., Dockerfile)"
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        description: "Docker build context directory"
        required: false
        type: string
        default: "."
      docker-build-args:
        description: "Docker build arguments (space-separated, e.g., '--build-arg VERSION=1.0.0 --build-arg ENV=prod')"
        required: false
        type: string
        default: ""
    secrets:
      NEXUS_USERNAME:
        description: "Nexus username for resolving private Python packages"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus password for resolving private Python packages"
        required: false
      NEXUS_REPOSITORY_URL:
        description: "Nexus repository base URL (e.g., https://host/repository/wheels/)"
        required: false

jobs:
  extract-versions:
    name: Extract Python Versions
    runs-on: ${{ inputs.runner }}
    outputs:
      python-versions: ${{ steps.extract.outputs.versions-json }}
      min-version: ${{ steps.extract.outputs.min-version }}
      max-version: ${{ steps.extract.outputs.max-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract Python versions
        uses: m4nh/shared-cicd/actions/python/extract-python-versions@main
        id: extract

  lint:
    name: Lint
    runs-on: ${{ inputs.runner }}
    if: inputs.lint-enabled
    needs: [extract-versions]
    steps:
      - uses: actions/checkout@v4

      - name: Python Lint
        uses: m4nh/shared-cicd/actions/python/python-lint@main
        with:
          python-version: ${{ needs.extract-versions.outputs.min-version }}
          linter: ${{ inputs.linter }}
          linter-args: ${{ inputs.linter-args }}
          path: ${{ inputs.lint-path }}
          fix: ${{ inputs.lint-fix }}

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ inputs.runner }}
    if: inputs.tests-enabled
    needs: extract-versions
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.extract-versions.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run pytest
        uses: m4nh/shared-cicd/actions/python/run-pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: ${{ inputs.pytest-args }}
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          nexus-repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}

  security:
    name: Security Scan
    runs-on: ${{ inputs.runner }}
    if: inputs.security-enabled
    needs: [extract-versions]
    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        uses: m4nh/shared-cicd/actions/python/run-security-scan@main
        with:
          python-version: ${{ needs.extract-versions.outputs.min-version }}
          source-path: ${{ inputs.security-source-path }}
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          nexus-repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}

  build-wheel:
    name: Build Wheel
    runs-on: ${{ inputs.runner }}
    if: inputs.build-wheel-enabled
    needs: [extract-versions]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: m4nh/shared-cicd/actions/python/build-wheel@main
        with:
          python-version: ${{ needs.extract-versions.outputs.min-version }}

  build-docker:
    name: Build Docker Image
    runs-on: ${{ inputs.runner }}
    if: inputs.build-docker-enabled
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        uses: m4nh/shared-cicd/actions/docker/build-docker-image@main
        with:
          dockerfile: ${{ inputs.docker-dockerfile }}
          context: ${{ inputs.docker-context }}
          tags: ci:latest
          build-args: ${{ inputs.docker-build-args }}
