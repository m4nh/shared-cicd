name: CI - C++

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        required: false
        type: string
        default: "ubuntu-22.04"
      format-check-enabled:
        description: "Enable code formatting check with clang-format"
        required: false
        type: boolean
        default: true
      tests-enabled:
        description: "Enable CMake build and unit tests"
        required: false
        type: boolean
        default: true
      cmake-build-type:
        description: "CMake build type (Release, Debug, RelWithDebInfo)"
        required: false
        type: string
        default: "Release"
      cmake-extra-args:
        description: "Additional CMake configuration arguments"
        required: false
        type: string
        default: ""
      ctest-args:
        description: "Additional arguments to pass to ctest"
        required: false
        type: string
        default: "--output-on-failure"
      docker-build-enabled:
        description: "Enable Docker build"
        required: false
        type: boolean
        default: true
      docker-dockerfile:
        description: "Path to Dockerfile (e.g., dockerfiles/Dockerfile)"
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        description: "Docker build context directory"
        required: false
        type: string
        default: "."
      docker-tags:
        description: "Docker image tags (comma or space-separated)"
        required: false
        type: string
        default: "ci:latest"
      docker-build-args:
        description: "Docker build arguments (space-separated, e.g., '--build-arg VERSION=1.0.0')"
        required: false
        type: string
        default: ""

jobs:
  format-check:
    name: Format Check
    runs-on: ${{ inputs.runner }}
    if: inputs.format-check-enabled
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check code formatting
        shell: bash
        run: |
          echo "Checking C++ code formatting..."
          find src includes tests -type f \( -name "*.cpp" -o -name "*.hpp" \) \
            -exec clang-format --dry-run -Werror {} +

  build-and-test:
    name: Build & Test
    runs-on: ${{ inputs.runner }}
    if: inputs.tests-enabled
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            wget \
            ca-certificates \
            git \
            pkg-config \
            libopencv-dev \
            nlohmann-json3-dev \
            libboost-all-dev \
            libeigen3-dev \
            python3-numpy \
            python3-dev \
            libsqlite3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxi-dev \
            libunwind-dev \
            libceres-dev \
            libsuitesparse-dev \
            libgoogle-glog-dev \
            libgflags-dev \
            libcgal-dev \
            libcgal-qt5-dev \
            libmetis-dev \
            libfreeimage-dev \
            libglew-dev \
            libopenimageio-dev \
            openimageio-tools \
            libyaml-cpp-dev

      - name: Install CMake 3.29.8
        shell: bash
        run: |
          CMAKE_VERSION=3.29.8
          wget -q https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz -O /tmp/cmake.tar.gz
          sudo tar --strip-components=1 -xzf /tmp/cmake.tar.gz -C /usr/local
          rm /tmp/cmake.tar.gz
          cmake --version

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ inputs.cmake-build-type }} \
            -DCALIBRY_BUILD_TESTS=ON \
            ${{ inputs.cmake-extra-args }}

      - name: Build
        shell: bash
        run: |
          cmake --build build -j$(nproc)

      - name: Run tests
        shell: bash
        run: |
          ctest --test-dir build ${{ inputs.ctest-args }}

  docker-build:
    name: Build Docker Image
    runs-on: ${{ inputs.runner }}
    if: inputs.docker-build-enabled
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        uses: m4nh/shared-cicd/actions/docker/build-docker-image@main
        with:
          dockerfile: ${{ inputs.docker-dockerfile }}
          context: ${{ inputs.docker-context }}
          tags: ${{ inputs.docker-tags }}
          build-args: ${{ inputs.docker-build-args }}
