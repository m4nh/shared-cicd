name: Release - Python

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        required: false
        type: string
        default: "ubuntu-latest"
      docker-enabled:
        description: "Enable Docker image build and push"
        required: false
        type: boolean
        default: true
      docker-target-repository:
        description: "Target Docker repository (e.g., org/image)"
        required: false
        type: string
        default: ""
      docker-registry:
        description: "Docker registry URL (e.g., docker.io, ghcr.io)"
        required: false
        type: string
        default: "docker.io"
      publish-package-enabled:
        description: "Enable package publishing to Nexus"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_USERNAME:
        description: "Docker Hub username"
        required: false
      DOCKER_TOKEN:
        description: "Docker Hub token"
        required: false
      NEXUS_USERNAME:
        description: "Nexus username"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus password"
        required: false
      NEXUS_REPOSITORY_URL:
        description: "Nexus repository URL"
        required: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Tag and GitHub Release
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: semrel
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"
          commit: "false"
          tag: "true"
          push: "true"
          vcs_release: "true"

  extract-versions:
    name: Extract Python Versions
    runs-on: ${{ inputs.runner }}
    outputs:
      python-versions: ${{ steps.extract.outputs.versions-json }}
      min-version: ${{ steps.extract.outputs.min-version }}
      max-version: ${{ steps.extract.outputs.max-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Python Versions
        uses: m4nh/shared-cicd/actions/python/extract-python-versions@main
        id: extract

  build-docker:
    name: Build Docker Image
    runs-on: ${{ inputs.runner }}
    needs: release
    if: inputs.docker-enabled && needs.release.outputs.released == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        uses: m4nh/shared-cicd/actions/docker/build-docker-image@main
        with:
          tags: "release-image:${{ needs.release.outputs.version }}"

  push-docker:
    name: Push Docker Image
    runs-on: ${{ inputs.runner }}
    needs: [release, build-docker]
    if: inputs.docker-enabled && needs.release.outputs.released == 'true'

    steps:
      - name: Push Docker Image
        uses: m4nh/shared-cicd/actions/docker/push-docker@main
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_TOKEN }}
          image-name: release-image
          image-tag: ${{ needs.release.outputs.version }}
          target-repository: ${{ inputs.docker-target-repository }}
          registry: ${{ inputs.docker-registry }}

  build-package:
    name: Build Package
    runs-on: ${{ inputs.runner }}
    needs: [release, extract-versions]
    if: needs.release.outputs.released == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wheel
        uses: m4nh/shared-cicd/actions/python/build-wheel@main
        with:
          python-version: ${{ needs.extract-versions.outputs.min-version }}
          version: ${{ needs.release.outputs.version }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-package:
    name: Publish Package to Nexus
    runs-on: ${{ inputs.runner }}
    needs: [build-package, release]
    if: inputs.publish-package-enabled && needs.release.outputs.released == 'true'

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish Package
        uses: m4nh/shared-cicd/actions/python/publish-package@main
        with:
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          wheel-path: dist/
          repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}

  github-release:
    name: Create GitHub Release with Artifacts
    runs-on: ${{ inputs.runner }}
    needs: [release, publish-package, push-docker]
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.release.outputs.tag }}
          files: dist/*
          generate_release_notes: true
