name: Snapshot - Python

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        required: false
        type: string
        default: "ubuntu-latest"
      version-tag-prefix:
        description:
          "Prefix used on release tags to extract the base version (e.g., 'v'
          for 'v1.2.3')"
        required: false
        type: string
        default: "v"
      tests-enabled:
        description: "Enable pytest before snapshot"
        required: false
        type: boolean
        default: true
      pytest-args:
        description: "Additional arguments to pass to pytest"
        required: false
        type: string
        default: ""
      docker-enabled:
        description: "Enable Docker image build and push"
        required: false
        type: boolean
        default: true
      docker-target-repository:
        description: "Target Docker repository (e.g., org/image)"
        required: false
        type: string
        default: ""
      docker-registry:
        description: "Docker registry URL (e.g., docker.io, ghcr.io)"
        required: false
        type: string
        default: "docker.io"
      docker-dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        description: "Docker build context directory"
        required: false
        type: string
        default: "."
      docker-build-args:
        description: "Additional Docker build arguments (space-separated, e.g.,
          '--build-arg K=V')"
        required: false
        type: string
        default: ""
      publish-package-enabled:
        description: "Enable package publishing to Nexus"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_USERNAME:
        description: "Docker registry username"
        required: false
      DOCKER_PASSWORD:
        description: "Docker registry password or token"
        required: false
      NEXUS_USERNAME:
        description: "Nexus username"
        required: false
      NEXUS_PASSWORD:
        description: "Nexus password"
        required: false
      NEXUS_REPOSITORY_URL:
        description: "Nexus repository URL"
        required: false

concurrency:
  group: develop
  cancel-in-progress: true

jobs:
  extract-versions:
    name: Extract Python Versions
    runs-on: ${{ inputs.runner }}
    outputs:
      python-versions: ${{ steps.extract.outputs.versions-json }}
      min-version: ${{ steps.extract.outputs.min-version }}
      max-version: ${{ steps.extract.outputs.max-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract Python versions
        uses: m4nh/shared-cicd/actions/python/extract-python-versions@main
        id: extract

  compute-version:
    name: Compute Version
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.snapshot.outputs.version }}
      pep440-version: ${{ steps.snapshot.outputs.version }}
      docker-version: ${{ steps.snapshot.outputs.docker-version }}

    steps:
      - name: Compute snapshot version
        id: snapshot
        uses: m4nh/shared-cicd/actions/git/snapshot-version-pep440@main
        with:
          tag-prefix: ${{ inputs.version-tag-prefix }}

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ inputs.runner }}
    if: inputs.tests-enabled
    needs: extract-versions
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.extract-versions.outputs.python-versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run pytest
        uses: m4nh/shared-cicd/actions/python/run-pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: ${{ inputs.pytest-args }}
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          nexus-repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}

  docker:
    name: Build and Push Docker Image
    runs-on: ${{ inputs.runner }}
    needs: [compute-version, test]
    if: inputs.docker-enabled && always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pip Nexus secret
        shell: bash
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY_URL: ${{ secrets.NEXUS_REPOSITORY_URL }}
        run: |
          if [ -n "$NEXUS_REPOSITORY_URL" ]; then
            BASE_URL="${NEXUS_REPOSITORY_URL%/}"
            PROTO="${BASE_URL%%://*}"
            REST="${BASE_URL#*://}"
            echo "${PROTO}://${NEXUS_USERNAME}:${NEXUS_PASSWORD}@${REST}/simple/" > /tmp/pip_extra_index_url
          else
            echo "" > /tmp/pip_extra_index_url
          fi

      - name: Build Docker Image
        uses: m4nh/shared-cicd/actions/docker/build-docker-image@main
        with:
          dockerfile: ${{ inputs.docker-dockerfile }}
          context: ${{ inputs.docker-context }}
          tags: "dev-image:${{ needs.compute-version.outputs.docker-version }}"
          version: ${{ needs.compute-version.outputs.pep440-version }}
          build-args: ${{ inputs.docker-build-args }}
          build-secrets: "--secret id=pip_extra_index_url,src=/tmp/pip_extra_index_url"

      - name: Push Docker Image
        uses: m4nh/shared-cicd/actions/docker/push-docker@main
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          image-name: dev-image
          image-tag: ${{ needs.compute-version.outputs.docker-version }}
          target-repository: ${{ inputs.docker-target-repository }}
          registry: ${{ inputs.docker-registry }}

  build-and-publish-package:
    name: Build and Publish Package
    runs-on: ${{ inputs.runner }}
    needs: [compute-version, extract-versions, test]
    if: inputs.publish-package-enabled && always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wheel
        uses: m4nh/shared-cicd/actions/python/build-wheel@main
        with:
          python-version: ${{ needs.extract-versions.outputs.min-version }}
          version: ${{ needs.compute-version.outputs.pep440-version }}

      - name: Publish Package
        uses: m4nh/shared-cicd/actions/python/publish-package@main
        with:
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          wheel-path: dist/*
          repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}
