name: Snapshot - Svelte

on:
  workflow_call:
    inputs:
      runner:
        required: false
        type: string
        default: "ubuntu-latest"
      version-tag-prefix:
        required: false
        type: string
        default: "v"
      node-version:
        required: false
        type: string
        default: "20"
      docker-enabled:
        required: false
        type: boolean
        default: true
      docker-target-repository:
        required: false
        type: string
        default: ""
      docker-registry:
        required: false
        type: string
        default: "docker.io"
      docker-dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        required: false
        type: string
        default: "."
      docker-build-args:
        required: false
        type: string
        default: ""
      publish-package-enabled:
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      NEXUS_USERNAME:
        required: false
      NEXUS_PASSWORD:
        required: false
      NEXUS_REPOSITORY_URL:
        required: false

concurrency:
  group: develop
  cancel-in-progress: true

jobs:
  compute-version:
    name: Compute Version
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver-version: ${{ steps.semver.outputs.SEMVER_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract current version from VCS
        id: version
        uses: m4nh/shared-cicd/actions/git/vcs-version@main
        with:
          tag-prefix: ${{ inputs.version-tag-prefix }}

      - name: Compute semver dev version
        id: semver
        run: |
          BUILD=$(git rev-list "${{ steps.version.outputs.tag }}"..HEAD --count)
          echo "SEMVER_VERSION=${{ steps.version.outputs.version }}-dev.${BUILD}" >> $GITHUB_OUTPUT
  docker:
    name: Build and Push Docker Image
    runs-on: ${{ inputs.runner }}
    needs: compute-version
    if: inputs.docker-enabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        uses: m4nh/shared-cicd/actions/docker/build-docker-image@main
        with:
          dockerfile: ${{ inputs.docker-dockerfile }}
          context: ${{ inputs.docker-context }}
          tags: "dev-image:${{ needs.compute-version.outputs.semver-version }}"
          build-args: ${{ inputs.docker-build-args }}

      - name: Push Docker Image
        uses: m4nh/shared-cicd/actions/docker/push-docker@main
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          image-name: dev-image
          image-tag: ${{ needs.compute-version.outputs.semver-version }}
          target-repository: ${{ inputs.docker-target-repository }}
          registry: ${{ inputs.docker-registry }}

  build-and-publish-package:
    name: Build and Publish Package
    runs-on: ${{ inputs.runner }}
    needs: compute-version
    if: inputs.publish-package-enabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp dev version into package.json
        run: yarn version --new-version ${{ needs.compute-version.outputs.semver-version }} --no-git-tag-version

      - name: Build
        uses: m4nh/shared-cicd/actions/yarn/build-package@main
        with:
          node-version: ${{ inputs.node-version }}

      - name: Publish Package
        uses: m4nh/shared-cicd/actions/yarn/publish-package@main
        with:
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}
