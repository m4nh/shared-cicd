name: Snapshot - Svelte

on:
  workflow_call:
    inputs:
      runner:
        required: false
        type: string
        default: "ubuntu-latest"
      version-tag-prefix:
        required: false
        type: string
        default: "v"
      node-version:
        required: false
        type: string
        default: "20"
      docker-enabled:
        required: false
        type: boolean
        default: true
      docker-target-repository:
        required: false
        type: string
        default: ""
      docker-registry:
        required: false
        type: string
        default: "docker.io"
      docker-dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        required: false
        type: string
        default: "."
      docker-build-args:
        required: false
        type: string
        default: ""
      npm-scope:
        required: false
        type: string
        default: ""
      publish-package-enabled:
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      NEXUS_USERNAME:
        required: false
      NEXUS_PASSWORD:
        required: false
      NEXUS_REPOSITORY_URL:
        required: false

concurrency:
  group: develop
  cancel-in-progress: true

jobs:
  compute-version:
    name: Compute Version
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver-version: ${{ steps.semver.outputs.SEMVER_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract current version from VCS
        id: version
        uses: m4nh/shared-cicd/actions/git/vcs-version@main
        with:
          tag-prefix: ${{ inputs.version-tag-prefix }}

      - name: Compute semver dev version
        id: semver
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          FOUND="${{ steps.version.outputs.found }}"
          if [ "$FOUND" = "true" ]; then
            BUILD=$(git rev-list "${TAG}"..HEAD --count)
          else
            BUILD=$(git rev-list --all --count)
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "SEMVER_VERSION=${{ steps.version.outputs.version }}-dev.${BUILD}+${SHA}" >> $GITHUB_OUTPUT
  docker:
    name: Build and Push Docker Image
    runs-on: ${{ inputs.runner }}
    needs: compute-version
    if: inputs.docker-enabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker build secret
        if: inputs.npm-scope != ''
        shell: bash
        env:
          NPM_SCOPE: ${{ inputs.npm-scope }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          printf 'npmScopes:\n  %s:\n    npmAuthIdent: %s\n' \
            "$NPM_SCOPE" "$(printf '%s:%s' "$NEXUS_USERNAME" "$NEXUS_PASSWORD" | base64 -w 0)" > /tmp/ci-yarnrc.yml

      - name: Build Docker Image
        uses: m4nh/shared-cicd/actions/docker/build-docker-image@main
        with:
          dockerfile: ${{ inputs.docker-dockerfile }}
          context: ${{ inputs.docker-context }}
          tags: "dev-image:${{ needs.compute-version.outputs.semver-version }}"
          build-args: ${{ inputs.docker-build-args }}
          build-secrets: ${{ inputs.npm-scope != '' && '--secret id=yarnrc,src=/tmp/ci-yarnrc.yml' || '' }}

      - name: Push Docker Image
        uses: m4nh/shared-cicd/actions/docker/push-docker@main
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          image-name: dev-image
          image-tag: ${{ needs.compute-version.outputs.semver-version }}
          target-repository: ${{ inputs.docker-target-repository }}
          registry: ${{ inputs.docker-registry }}

  build-and-publish-package:
    name: Build and Publish Package
    runs-on: ${{ inputs.runner }}
    needs: compute-version
    if: inputs.publish-package-enabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: m4nh/shared-cicd/actions/yarn/build-package@main
        with:
          node-version: ${{ inputs.node-version }}
          version: ${{ needs.compute-version.outputs.semver-version }}
          npm-scope: ${{ inputs.npm-scope }}
          npm-username: ${{ secrets.NEXUS_USERNAME }}
          npm-password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Publish Package
        uses: m4nh/shared-cicd/actions/yarn/publish-package@main
        with:
          nexus-username: ${{ secrets.NEXUS_USERNAME }}
          nexus-password: ${{ secrets.NEXUS_PASSWORD }}
          repository-url: ${{ secrets.NEXUS_REPOSITORY_URL }}
