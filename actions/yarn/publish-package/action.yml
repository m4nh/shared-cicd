name: "Publish NPM Package to Nexus"
description: "Publish an NPM package to a Nexus npm repository using Yarn"

inputs:
  nexus-username:
    description: "Nexus username for authentication"
    required: true
  nexus-password:
    description: "Nexus password for authentication"
    required: true
  repository-url:
    description: "Nexus npm repository URL (e.g., https://nexus.example.com/repository/npm-hosted/)"
    required: true
  package-path:
    description: "Path to the directory containing package.json"
    required: false
    default: "."
  node-version:
    description: "Node.js version to use"
    required: false
    default: "20"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Configure Nexus registry auth
      shell: bash
      working-directory: ${{ inputs.package-path }}
      env:
        REPOSITORY_URL: ${{ inputs.repository-url }}
        NEXUS_USERNAME: ${{ inputs.nexus-username }}
        NEXUS_PASSWORD: ${{ inputs.nexus-password }}
      run: |
        yarn config set npmRegistryServer "$REPOSITORY_URL"
        yarn config set npmAuthIdent "${NEXUS_USERNAME}:${NEXUS_PASSWORD}"
        yarn config set npmAlwaysAuth true

    - name: Publish to Nexus
      shell: bash
      working-directory: ${{ inputs.package-path }}
      run: yarn npm publish
