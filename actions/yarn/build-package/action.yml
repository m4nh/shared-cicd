name: "Build Node.js Package"
description: "Install dependencies and build a Node.js package using Yarn"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "20"
  package-path:
    description: "Path to the directory containing package.json"
    required: false
    default: "."
  build-command:
    description: "Yarn build command to run"
    required: false
    default: "build"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.package-path }}
      run: yarn install --immutable

    - name: Build
      shell: bash
      working-directory: ${{ inputs.package-path }}
      run: yarn ${{ inputs.build-command }}
