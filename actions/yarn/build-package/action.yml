name: "Build Node.js Package"
description: "Install dependencies and build a Node.js package using Yarn"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "20"
  package-path:
    description: "Path to the directory containing package.json"
    required: false
    default: "."
  build-command:
    description: "Yarn build command to run"
    required: false
    default: "build"
  version:
    description: "Version to stamp into package.json before building (e.g., '1.2.3-dev.4'). If empty, package.json is not modified."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Stamp version into package.json
      if: inputs.version != ''
      shell: bash
      working-directory: ${{ inputs.package-path }}
      run: |
        node -e "
          const pkg = require('./package.json');
          pkg.version = '${{ inputs.version }}';
          require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
        "

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.package-path }}
      run: yarn install --immutable

    - name: Build
      shell: bash
      working-directory: ${{ inputs.package-path }}
      run: yarn ${{ inputs.build-command }}
