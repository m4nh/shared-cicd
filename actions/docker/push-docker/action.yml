name: "Push Docker Image"
description: "Push a Docker image to Docker Hub or another registry"

inputs:
  docker-username:
    description: "Docker registry username for authentication"
    required: true
  docker-password:
    description: "Docker registry password or token for authentication"
    required: true
  image-name:
    description: "Local image name to push (e.g., 'myapp')"
    required: true
  image-tag:
    description: "Image tag/version to push (e.g., '1.0.0')"
    required: true
  target-repository:
    description: "Target repository path (e.g., 'myorg/myapp')"
    required: true
  registry:
    description: "Docker registry URL"
    required: false
    default: "docker.io"

runs:
  using: "composite"
  steps:
    - name: Login to Docker Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.docker-username }}
        password: ${{ inputs.docker-password }}

    - name: Tag image
      shell: bash
      run: |
        docker tag \
          ${{ inputs.image-name }}:${{ inputs.image-tag }} \
          ${{ inputs.registry }}/${{ inputs.target-repository }}:${{ inputs.image-tag }}

    - name: Push image
      shell: bash
      run: |
        docker push \
          ${{ inputs.registry }}/${{ inputs.target-repository }}:${{ inputs.image-tag }}
