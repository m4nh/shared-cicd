name: "Run Pytest"
description: "Run pytest with Python version from matrix, installing dependencies from pyproject.toml"

inputs:
  python-version:
    description: "Python version to use"
    required: true
  pytest-args:
    description: "Additional arguments to pass to pytest"
    required: false
    default: ""
  cache-pip:
    description: "Enable pip caching"
    required: false
    default: "true"
  extras:
    description: "Extras to install (e.g., 'dev,test')"
    required: false
    default: "dev"
  nexus-username:
    description: "Nexus username for private package installation"
    required: false
    default: ""
  nexus-password:
    description: "Nexus password for private package installation"
    required: false
    default: ""
  nexus-repository-url:
    description: "Nexus repository base URL (e.g., https://host/repository/wheels/). When provided, packages are also resolved from this index."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ inputs.cache-pip == 'true' && 'pip' || 'none' }}
        cache-dependency-path: pyproject.toml

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      shell: bash
      env:
        NEXUS_USERNAME: ${{ inputs.nexus-username }}
        NEXUS_PASSWORD: ${{ inputs.nexus-password }}
        NEXUS_REPOSITORY_URL: ${{ inputs.nexus-repository-url }}
      run: |
        if [ -n "$NEXUS_REPOSITORY_URL" ]; then
          BASE_URL="${NEXUS_REPOSITORY_URL%/}"
          PROTO="${BASE_URL%%://*}"
          REST="${BASE_URL#*://}"
          EXTRA_INDEX_URL="${PROTO}://${NEXUS_USERNAME}:${NEXUS_PASSWORD}@${REST}/simple/"
          pip install ".[${{ inputs.extras }}]" --extra-index-url "$EXTRA_INDEX_URL"
        else
          pip install ".[${{ inputs.extras }}]"
        fi

    - name: Run pytest
      shell: bash
      run: pytest ${{ inputs.pytest-args }}
