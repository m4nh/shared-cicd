name: "Run Pytest"
description: "Run pytest with Python version from matrix, installing dependencies from pyproject.toml"

inputs:
  python-version:
    description: "Python version to use"
    required: true
  pytest-args:
    description: "Additional arguments to pass to pytest"
    required: false
    default: ""
  cache-pip:
    description: "Enable pip caching"
    required: false
    default: "true"
  extras:
    description: "Extras to install (e.g., 'dev,test')"
    required: false
    default: "dev"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ inputs.cache-pip == 'true' && 'pip' || 'none' }}
        cache-dependency-path: pyproject.toml

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      shell: bash
      run: pip install ".[dev]"

    - name: Run pytest
      shell: bash
      run: pytest ${{ inputs.pytest-args }}
