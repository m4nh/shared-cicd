name: "Extract Version from VCS"
description: "Extracts the latest semantic version tag from git."

inputs:
  tag-prefix:
    description: "Prefix for semantic version tags (e.g., 'v' for tags like 'v1.0.0')"
    required: false
    default: "v"
  fallback-version:
    description: "Version to return if no matching tags found"
    required: false
    default: "0.0.0"

outputs:
  version:
    description: "The semantic version without the prefix (e.g., '1.2.3' from tag 'v1.2.3')"
    value: ${{ steps.version-step.outputs.VERSION }}
  tag:
    description: "The full git tag including prefix (e.g., 'v1.2.3')"
    value: ${{ steps.version-step.outputs.TAG }}
  found:
    description: "Whether a matching tag was found ('true' or 'false')"
    value: ${{ steps.version-step.outputs.FOUND }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Extract current version from VCS
      id: version-step
      shell: bash
      run: |
        # Get the latest release tag with the specified prefix (e.g., v*)
        TAG=$(git tag -l '${{ inputs.tag-prefix }}*' --sort=-v:refname | grep -E '^${{ inputs.tag-prefix }}[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

        if [ -z "$TAG" ]; then
          echo "::warning::No release tags found with prefix '${{ inputs.tag-prefix }}', using fallback version: ${{ inputs.fallback-version }}"
          echo "VERSION=${{ inputs.fallback-version }}" >> $GITHUB_OUTPUT
          echo "TAG=" >> $GITHUB_OUTPUT
          echo "FOUND=false" >> $GITHUB_OUTPUT
        else
          VERSION=$(echo "$TAG" | sed 's/^${{ inputs.tag-prefix }}//')
