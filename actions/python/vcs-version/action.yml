name: "Extract Version from VCS"
description: "Extracts the latest semantic version from git tags and returns it."

inputs:
  tag-pattern:
    description: "Regex pattern for git tags (default: 'v*' matching vX.Y.Z format)"
    required: false
    default: "v*"
  fallback-version:
    description: "Version to return if no tags match the pattern (optional, will error if not provided and no tags found)"
    required: false
    default: ""

outputs:
  version:
    description: "The semantic version without the 'v' prefix (e.g., '1.2.3')"
    value: ${{ steps.version-step.outputs.VERSION }}
  tag:
    description: "The full git tag including prefix (e.g., 'v1.2.3')"
    value: ${{ steps.version-step.outputs.TAG }}
  found:
    description: "Whether a matching tag was found ('true' or 'false')"
    value: ${{ steps.version-step.outputs.FOUND }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Extract current version from VCS
      id: version-step
      shell: bash
      run: |
        # Get the latest release tag (vX.Y.Z only), ignoring develop tags
        TAG=$(git tag -l '${{ inputs.tag-pattern }}' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

        if [ -z "$TAG" ]; then
          if [ -n "${{ inputs.fallback-version }}" ]; then
            echo "::warning::No release tags found, using fallback version: ${{ inputs.fallback-version }}"
            echo "VERSION=${{ inputs.fallback-version }}" >> $GITHUB_OUTPUT
            echo "TAG=" >> $GITHUB_OUTPUT
            echo "FOUND=false" >> $GITHUB_OUTPUT
          else
            echo "::error::No release tags found matching pattern: ${{ inputs.tag-pattern }}"
            exit 1
          fi
        else
          VERSION=$(echo "$TAG" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "FOUND=true" >> $GITHUB_OUTPUT
        fi
