name: "Python Lint"
description: "Run Python linting with configurable linter and arguments"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  linter:
    description: "Linter to use (ruff, flake8, pylint, black)"
    required: false
    default: "ruff"
  linter-args:
    description: "Additional arguments for the linter"
    required: false
    default: ""
  path:
    description: "Path to lint"
    required: false
    default: "."
  fix:
    description: "Auto-fix issues if the linter supports it"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install linter
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install ${{ inputs.linter }}

    - name: Run linter
      shell: bash
      run: |
        LINTER="${{ inputs.linter }}"
        PATH_TO_LINT="${{ inputs.path }}"
        ARGS="${{ inputs.linter-args }}"
        FIX="${{ inputs.fix }}"

        case "$LINTER" in
          ruff)
            if [ "$FIX" = "true" ]; then
              ruff check --fix $ARGS "$PATH_TO_LINT"
            else
              ruff check $ARGS "$PATH_TO_LINT"
            fi
            ;;
          flake8)
            flake8 $ARGS "$PATH_TO_LINT"
            ;;
          pylint)
            pylint $ARGS "$PATH_TO_LINT"
            ;;
          black)
            if [ "$FIX" = "true" ]; then
              black $ARGS "$PATH_TO_LINT"
            else
              black --check $ARGS "$PATH_TO_LINT"
            fi
            ;;
          *)
            echo "Unknown linter: $LINTER"
            exit 1
            ;;
        esac
