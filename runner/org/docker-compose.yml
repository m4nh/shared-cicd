x-github-runner: &github-runner
  build: .
  restart: unless-stopped

  env_file:
    - .env

  tty: true
  stdin_open: true

  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  github-runner-1:
    <<: *github-runner
    container_name: github-runner-1
    environment:
      # GitHub instance configuration
      GITHUB_HOST: github.com
      RUNNER_SCOPE: org

      # Org-level configuration
      ORG_NAME: ${ORG_NAME}

      # Runner identity (unique suffix auto-generated)
      RUNNER_NAME_PREFIX: ${RUNNER_NAME_PREFIX:-runner}
      RANDOM_RUNNER_SUFFIX: "true"
      LABELS: ${RUNNER_LABELS}

      # GitHub auth
      ACCESS_TOKEN: ${ACCESS_TOKEN}

      # Optional tuning
      RUNNER_WORKDIR: /tmp/github-runner-1
      RUNNER_GROUP: ${RUNNER_GROUP}

      # Ephemeral: container restarts after each job, preventing state contamination
      EPHEMERAL: "true"
    volumes:
      - runner-data-1:/actions-runner
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  runner-data-1:
